<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pelmeshkin Catalog</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="header brand-header">
  <div class="brand">
    <img class="brand-avatar" src="./assets/max.jpg" alt="Пельмешкин" />
    <div>
      <div class="brand-name">Пельмешкин</div>
      <div class="brand-subtitle">Домашняя кухня</div>
    </div>
  </div>

  <button class="cart-fab" id="cartButton">🛒 <span id="cartCount">0</span></button>
</header>

    <section id="catalogScreen">
      <nav class="tabs" id="categoryTabs"></nav>

      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Поиск..." />
        <span>⌕</span>
      </div>

      <main id="catalog" class="catalog"></main>
    </section>

    <section id="productScreen" class="screen hidden">
      <button id="backFromProduct" class="back">‹ Назад</button>
      <div id="productDetails"></div>
    </section>

    <section id="cartScreen" class="cart-screen hidden">
      <div class="cart-head">
        <button id="backToCatalog" class="back">‹ Назад</button>
        <h1>Корзина</h1>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-total">
        <b>Итого:</b> <span id="cartTotal">0 ₽</span>
      </div>

      <button id="goToCheckoutBtn" class="checkout">Перейти к оформлению</button>
    </section>

    <section id="checkoutScreen" class="cart-screen hidden">
      <div class="cart-head">
        <button id="backToCart" class="back">‹ Назад</button>
        <h1>Оформление</h1>
      </div>

      <div class="checkout-form">
        <label>Имя *</label>
        <input id="customerName" type="text" placeholder="Ваше имя" />

        <label>Телефон *</label>
        <input id="customerPhone" type="tel" placeholder="+357..." />

        <label>Адрес доставки *</label>
        <textarea id="customerAddress" placeholder="Адрес доставки"></textarea>

        <label>Комментарий *</label>
        <textarea id="customerComment" placeholder="Комментарий к заказу"></textarea>
      </div>

      <div class="cart-total">
        <b>Итого:</b> <span id="checkoutTotal">0 ₽</span>
      </div>

      <button id="checkoutBtn" class="checkout" disabled>Оформить заказ</button>
    </section>
  </div>

  <script src="./products.js"></script>
  <script src="./script.js"></script>
</body>
</html>
