<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pelmeshkin Catalog</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 id="pageTitle">Каталог</h1>
      <button class="cart-fab" id="cartButton" aria-label="Корзина">
        🛒 <span id="cartCount">0</span>
      </button>
    </header>

    <nav class="tabs" id="categoryTabs"></nav>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Поиск..." />
      <span>⌕</span>
    </div>

    <main id="catalog" class="catalog"></main>

    <section id="cartScreen" class="cart-screen hidden">
      <div class="cart-head">
        <button id="backToCatalog" class="back">‹ Back</button>
        <h1>Корзина</h1>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-total">
        <b>Итого:</b> <span id="cartTotal">0 ₽</span>
      </div>

      <button id="checkoutBtn" class="checkout">Перейти к оформлению заказа</button>
    </section>
  </div>

  <script src="./products.js"></script>
  <script src="./script.js"></script>
</body>
</html>
